<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankTime - Hỗ trợ tài chính sinh viên Kế toán</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --word-color: #059669;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        /* --- MÀN HÌNH BẮT ĐẦU (WELCOME SCREEN) --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #welcome-screen.hidden {
            transform: translateY(-100%);
        }

        .welcome-logo {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .welcome-sub {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
            font-weight: 300;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }

        /* --- GIAO DIỆN CHÍNH --- */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; display: none; }
        .container.active { display: block; animation: slideUp 0.6s ease; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { text-align: center; padding: 20px 0; }
        header h1 { color: var(--primary-color); font-size: 1.8rem; }

        .tabs-nav { display: flex; background: #e2e8f0; padding: 5px; border-radius: 12px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--secondary-color); border-radius: 8px; font-size: 0.85rem; }
        .tab-btn.active { background: var(--card-bg); color: var(--primary-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: var(--secondary-color); }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .amount-word { font-size: 0.8rem; color: var(--word-color); margin-top: 6px; font-style: italic; min-height: 1.2rem; }

        button.btn-calc { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button.btn-calc:hover { background: #1d4ed8; }

        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary-color); display: none; background: #eff6ff; }
        .result-error { background: var(--error-bg); border-left-color: #ef4444; color: var(--error-text); animation: shake 0.4s ease; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        /* Accordion */
        .accordion-item { border-bottom: 1px solid #f1f5f9; }
        .accordion-header { width: 100%; padding: 15px 0; text-align: left; background: none; border: none; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; }
        .accordion-body { max-height: 0; overflow: hidden; transition: 0.3s; font-size: 0.9rem; color: var(--secondary-color); }
        .accordion-item.active .accordion-body { max-height: 200px; padding-bottom: 15px; }

        .table-container { max-height: 250px; overflow-y: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f8fafc; position: sticky; top: 0; }
    </style>
</head>
<body>

<!-- TRANG BẮT ĐẦU -->
<div id="welcome-screen">
    <div class="welcome-logo">BankTime</div>
    <div class="welcome-sub">Hỗ trợ tài chính dành cho sinh viên Kế toán</div>
    <button class="btn-start" onclick="startApp()">Bắt đầu ngay</button>
</div>

<!-- TRANG ỨNG DỤNG CHÍNH -->
<div class="container" id="main-app">
    <header>
        <h1>BankTime</h1>
        <p style="font-size: 0.8rem; color: var(--secondary-color);">Công cụ tính toán chuẩn xác</p>
    </header>

    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="openTab(event, 'tab1')">Lý thuyết</button>
        <button class="tab-btn" onclick="openTab(event, 'tab2')">Tiết kiệm</button>
        <button class="tab-btn" onclick="openTab(event, 'tab3')">Trả góp</button>
    </nav>

    <!-- Tab 1 -->
    <div id="tab1" class="tab-content active">
        <div class="card">
            <div class="accordion-item">
                <button class="accordion-header" onclick="toggleAccordion(this)">Lãi đơn là gì? <span>+</span></button>
                <div class="accordion-body">Lãi tính cố định trên số vốn gốc ban đầu. I = P * r * n.</div>
            </div>
            <div class="accordion-item">
                <button class="accordion-header" onclick="toggleAccordion(this)">Lãi kép là gì? <span>+</span></button>
                <div class="accordion-body">Lãi cộng dồn vào gốc để tính lãi cho kỳ sau (Lãi mẹ đẻ lãi con).</div>
            </div>
        </div>
    </div>

    <!-- Tab 2 -->
    <div id="tab2" class="tab-content">
        <div class="card">
            <div class="form-group">
                <label>Số tiền mục tiêu (VNĐ)</label>
                <input type="number" id="targetAmount" placeholder="Nhập mục tiêu..." oninput="handleInput(this, 'targetWord')">
                <div id="targetWord" class="amount-word"></div>
            </div>
            <div class="form-group">
                <label>Số tiền gửi mỗi tháng (VNĐ)</label>
                <input type="number" id="monthlySaving" placeholder="Nhập tiền gửi..." oninput="handleInput(this, 'monthlyWord')">
                <div id="monthlyWord" class="amount-word"></div>
            </div>
            <div class="form-group">
                <label>Lãi suất ngân hàng (%/năm)</label>
                <input type="number" id="savingRate" step="0.1" placeholder="Bắt buộc nhập (Ví dụ: 6.5)">
            </div>
            <button class="btn-calc" onclick="calculateSaving()">Tính toán thời gian</button>
            <div id="savingResult" class="result-box"></div>
        </div>
    </div>

    <!-- Tab 3 -->
    <div id="tab3" class="tab-content">
        <div class="card">
            <div class="form-group">
                <label>Giá trị tài sản (VNĐ)</label>
                <input type="number" id="assetValue" placeholder="Ví dụ: 30000000" oninput="handleInput(this, 'assetWord')">
                <div id="assetWord" class="amount-word"></div>
            </div>
            <div class="form-group">
                <label>% Trả trước (%)</label>
                <input type="number" id="downPaymentPercent" placeholder="Ví dụ: 30">
            </div>
            <div class="form-group">
                <label>Lãi suất vay (%/năm)</label>
                <input type="number" id="loanRate" step="0.1" placeholder="Bắt buộc nhập (Ví dụ: 12)">
            </div>
            <div class="form-group">
                <label>Số tháng vay (tháng)</label>
                <input type="number" id="loanMonths" placeholder="Ví dụ: 12">
            </div>
            <button class="btn-calc" onclick="calculateInstallment()">Tính lịch trả góp</button>
            <div id="installmentResult" class="result-box">
                <p id="monthlyPayText" style="font-weight: bold; margin-bottom: 10px;"></p>
                <div class="table-container"><table id="scheduleTable"><thead><tr><th>Kỳ</th><th>Số tiền</th></tr></thead><tbody></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Hàm chuyển trang
    function startApp() {
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('main-app').classList.add('active');
    }

    // Thuật toán đọc số chuẩn xác
    function docSoTiengViet(so) {
        if (so == 0) return "Không đồng";
        const chuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
        const donVi = ["", "nghìn", "triệu", "tỷ"];
        let s = Math.floor(so).toString();
        while (s.length % 3 !== 0) s = "0" + s;
        let result = "", hasValue = false;
        for (let i = 0; i < s.length; i += 3) {
            let group = s.substr(i, 3);
            let gInt = parseInt(group);
            let dIndex = (s.length - i) / 3 - 1;
            if (gInt > 0) {
                let h = parseInt(group[0]), t = parseInt(group[1]), u = parseInt(group[2]);
                if (hasValue || h > 0) result += chuSo[h] + " trăm ";
                if (t > 1) result += chuSo[t] + " mươi ";
                else if (t === 1) result += "mười ";
                else if (hasValue && u > 0) result += "linh ";
                if (t > 1 && u === 1) result += "mốt ";
                else if (t > 0 && u === 5) result += "lăm ";
                else if (u > 0 || (!hasValue && gInt > 0)) {
                    if (u > 0 || (t === 0 && h === 0 && !hasValue)) result += chuSo[u] + " ";
                }
                result += donVi[dIndex % 4] + " ";
                hasValue = true;
            } else if (hasValue && dIndex > 0 && dIndex % 3 === 0) result += donVi[3] + " ";
        }
        return result.trim().charAt(0).toUpperCase() + result.trim().slice(1) + " đồng";
    }

    function handleInput(input, wordId) {
        const wordEl = document.getElementById(wordId);
        wordEl.innerText = (input.value && input.value != 0) ? docSoTiengViet(input.value) : "";
    }

    function openTab(evt, name) {
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(name).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function toggleAccordion(el) {
        el.parentElement.classList.toggle("active");
        el.querySelector("span").innerText = el.parentElement.classList.contains("active") ? "-" : "+";
    }

    function showError(element, message) {
        element.style.display = "block";
        element.classList.add("result-error");
        element.innerHTML = `⚠️ ${message}`;
    }

    function calculateSaving() {
        const targetRaw = document.getElementById('targetAmount').value;
        const monthlyRaw = document.getElementById('monthlySaving').value;
        const rateRaw = document.getElementById('savingRate').value;
        const resBox = document.getElementById('savingResult');

        if (targetRaw === "" || monthlyRaw === "" || rateRaw === "") {
            showError(resBox, "Vui lòng nhập đầy đủ các trường (bao gồm lãi suất).");
            return;
        }

        const target = parseFloat(targetRaw), monthly = parseFloat(monthlyRaw), rate = parseFloat(rateRaw);
        if (target <= 0 || monthly <= 0 || rate < 0) { showError(resBox, "Dữ liệu phải là số dương."); return; }
        if (monthly >= target) { showError(resBox, "Tiền gửi mỗi tháng không được lớn hơn hoặc bằng mục tiêu."); return; }

        const r = (rate / 100) / 12;
        let months = (r === 0) ? Math.ceil(target / monthly) : Math.ceil(Math.log((target * r / monthly) + 1) / Math.log(1 + r));
        resBox.style.display = "block"; resBox.classList.remove("result-error");
        resBox.innerHTML = `Bạn cần gửi trong <strong>${months} tháng</strong> để đạt mục tiêu.`;
    }

    function calculateInstallment() {
        const pR = document.getElementById('assetValue').value, dR = document.getElementById('downPaymentPercent').value;
        const rR = document.getElementById('loanRate').value, mR = document.getElementById('loanMonths').value;
        const resBox = document.getElementById('installmentResult');

        if (pR==="" || dR==="" || rR==="" || mR==="") { showError(resBox, "Vui lòng nhập đầy đủ thông tin."); return; }

        const p = parseFloat(pR), d = parseFloat(dR), r_y = parseFloat(rR), m = parseInt(mR);
        if (p<=0 || d<0 || d>=100 || r_y<0 || m<=0) { showError(resBox, "Dữ liệu không hợp lệ."); return; }

        const loan = p * (1 - d/100), r = (r_y/100)/12;
        const monthly = (r === 0) ? (loan / m) : (loan * r * Math.pow(1+r, m)) / (Math.pow(1+r, m) - 1);

        resBox.style.display = "block"; resBox.classList.remove("result-error");
        document.getElementById('monthlyPayText').innerText = `Trả mỗi tháng: ${new Intl.NumberFormat('vi-VN').format(Math.round(monthly))} VNĐ`;
        const tbody = document.querySelector("#scheduleTable tbody");
        tbody.innerHTML = "";
        for (let i = 1; i <= m; i++) tbody.innerHTML += `<tr><td>Kỳ ${i}</td><td>${new Intl.NumberFormat('vi-VN').format(Math.round(monthly))}</td></tr>`;
    }
</script>
</body>
</html>
